name: Run Spider

on:
  push:
    branches:
      - master
  schedule:
    - cron: "15 11 * * *" # Run the job every day at 11:15 AM UTC => 5:00 Nepal Time

jobs:
  run_spider:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Cache dependencies
        uses: actions/cache@v3
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run spider
        run: scrapy crawl market

      - name: Build site data
        run: python build_site_data.py

      - name: Commit and Push Files
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          # No-op cleanly on days the market was closed (nothing new to commit).
          git diff --staged --quiet || git commit -m "Share data has been successfully scrapped"
          git push origin master
